# Served by the frontend container. Nginx Proxy Manager terminates TLS and
# forwards sorry.danteb.com:443 → this container:80. The upstream `backend`
# is the `sorry-server` container on the `sorry` network.

upstream sorry_backend {
    server backend:8080;
}

# Map HTTP Upgrade → Connection so WebSocket upgrades survive the proxy.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Large-ish POSTs happen when creating rooms with long names / rulesets.
    client_max_body_size 2m;

    # SvelteKit adapter-static output lives here.
    root /usr/share/nginx/html;
    index index.html;

    # --- API + WebSocket proxy (same-origin) ---
    # The WASM bundle uses `window.location.origin` by default, so every
    # `/api/*` call (REST + `/api/rooms/<code>/ws`) hits this server first,
    # and we forward to the `sorry-server` container.
    location /api/ {
        proxy_pass http://sorry_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (harmless for regular requests).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections need a generous read timeout.
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # Disable buffering so server-pushed WebSocket frames stream through.
        proxy_buffering off;
    }

    # --- SvelteKit static assets + SPA fallback ---
    # Cache build artifacts aggressively; they are content-hashed.
    location /_app/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else → serve the file if it exists, otherwise fall through
    # to the SvelteKit index so client-side routing can resolve the path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;
}
